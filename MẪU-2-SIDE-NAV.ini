<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nav — Per-Dot Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style-side-nav.css"/>
</head>
<body>

  <section class="section s1" id="s0">
    <div class="lbl">01 — Visual System</div>
    <h1 class="ttl">The Language<br>of Form</h1>
    <p class="body">A cohesive visual identity built from first principles — typography, spacing, color, and motion unified into a single expressive system.</p>
    <div class="ghost">01</div>
  </section>

  <section class="section s2" id="s1">
    <div class="lbl">02 — Photography</div>
    <h1 class="ttl">Light as<br>Medium</h1>
    <p class="body">Each frame is a considered decision. Documentary instinct meets precise composition — capturing the unguarded moment within a structured visual architecture.</p>
    <div class="ghost">02</div>
  </section>

  <section class="section s3" id="s2">
    <div class="lbl">03 — Illustration</div>
    <h1 class="ttl">Drawing<br>Thought</h1>
    <p class="body">Hand and concept in dialogue. Illustration as a way of thinking — working through ideas with line, texture, and the honest imprecision of making.</p>
    <div class="ghost">03</div>
  </section>

  <section class="section s4" id="s3">
    <div class="lbl">04 — 3D</div>
    <h1 class="ttl">Objects<br>in Space</h1>
    <p class="body">Three dimensions as a design surface — volumetric thinking applied to brand, product, and environment, bridging the material and the rendered world.</p>
    <div class="ghost">04</div>
  </section>

  <section class="section s5" id="s4">
    <div class="lbl">05 — Website</div>
    <h1 class="ttl">Interface<br>as Experience</h1>
    <p class="body">Screens that earn attention. Digital architecture designed for clarity and delight — where interaction design and visual craft are inseparable.</p>
    <div class="ghost">05</div>
  </section>

  <section class="section s6" id="s5">
    <div class="lbl">06 — Credits</div>
    <h1 class="ttl">Collaboration<br>&amp; Thanks</h1>
    <p class="body">Every project is a confluence of trust — a record of the people, partnerships, and institutions that made this body of work possible.</p>
    <div class="ghost">06</div>
  </section>

  <!--
    NAV — One pill shell, three states via data-state:
      "dots" → idle:   dots visible, each with internal fill track
      "pill" → hover:  pill widens, text labels shown
      "bar"  → scroll: active dot's fill syncs to section scroll %
  -->
  <nav id="nav" data-state="dots" role="navigation" aria-label="Page sections">

    <!-- DOTS — each dot has its own fill ring -->
    <div class="nav-dots" id="navDots" aria-hidden="true">
      <!-- Structure per dot (injected by JS):
           <div class="nav-dot">
             <svg class="dot-ring">…circle progress…</svg>
             <div class="dot-core"></div>
           </div>
      -->
    </div>

    <!-- LINKS — shown on hover -->
    <div class="nav-links" id="navLinks" role="list"></div>

  </nav>

  <script src="nav.js"></script>
</body>
</html>

---
/* ═══════════════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Palette */
  --bg:         #f0ece4;
  --ink:        #1a1612;
  --muted:      #9b9187;
  --accent:     #2d4a3e;
  --accent2:    #c4783a;
  --pill-dark:  rgba(24, 20, 16, 0.70);
  --glass-edge: rgba(255,255,255,0.10);

  /* Pill sizing */
  --pill-h:      38px;
  --pill-w-dots: 180px;   /* idle / scroll width  */
  --pill-w-menu: 460px;   /* hover expanded width */
  --pill-r:      99px;

  /* Dot geometry */
  --dot-gap:    10px;     /* gap between dots in the pill   */
  --dot-outer:  16px;     /* total clickable area per dot   */
  --dot-ring:   16px;     /* SVG ring diameter              */
  --dot-core:   6px;      /* solid center circle diameter   */
  --ring-stroke: 1.5px;   /* SVG circle stroke width        */

  /* Easing */
  --spring: cubic-bezier(0.34, 1.45, 0.64, 1);
  --smooth: cubic-bezier(0.16, 1,    0.3,  1);
  --snappy: cubic-bezier(0.4,  0,    0.2,  1);
}

/* ═══════════════════════════════════════════════════
   PAGE BASE
═══════════════════════════════════════════════════ */
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════
   SECTIONS
═══════════════════════════════════════════════════ */
.section {
  min-height: 500vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10vh 13vw;
  position: relative;
  overflow: hidden;
}
.s1 { background: #f3bbbb; }
.s2 { background: #e6dfd3; }
.s3 { background: #2d4a3e; color: #cfc9bf; }
.s3 .lbl, .s3 .body { color: rgba(207,201,191,0.5); }
.s4 { background: #181410; color: #e6e0d4; }
.s4 .lbl, .s4 .body { color: rgba(230,224,212,0.4); }
.s5 { background: #f5ede0; }
.s6 { background: #dedad4; }

.lbl {
  font-family: 'Unbounded', monospace;
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 22px;
}
.ttl {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(38px, 6vw, 84px); font-weight: 200;
  line-height: 1.07; letter-spacing: -0.025em;
  margin-bottom: 32px; max-width: 620px;
}
.body {
  font-size: 15px; line-height: 1.9;
  color: var(--muted); max-width: 400px; font-weight: 300;
}
.ghost {
  position: absolute; right: 8vw; bottom: 6vh;
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(80px, 15vw, 200px); font-weight: 200;
  opacity: 0.04; user-select: none; line-height: 1; color: currentColor;
}

/* ═══════════════════════════════════════════════════
   NAV SHELL  — single pill, width morphs by state
═══════════════════════════════════════════════════ */
#nav {
  position: fixed;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;

  height: var(--pill-h);
  width: var(--pill-w-dots);
  border-radius: var(--pill-r);
  overflow: hidden;

  background: var(--pill-dark);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border: 1px solid var(--glass-edge);
  box-shadow: 0 4px 24px rgba(0,0,0,0.22),
              inset 0 1px 0 rgba(255,255,255,0.06);
  cursor: pointer;

  transition:
    width      0.5s  var(--spring),
    background 0.3s  ease;
}

/* Hover → expand */
#nav[data-state="pill"] {
  width: var(--pill-w-menu);
  background: rgba(14, 11, 8, 0.86);
}

/* ═══════════════════════════════════════════════════
   DOTS LAYER
═══════════════════════════════════════════════════ */
.nav-dots {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--dot-gap);
  padding: 0 18px;
  z-index: 1;
  transition: opacity 0.22s var(--snappy);
}

/* Hide dots when pill menu is open */
#nav[data-state="pill"] .nav-dots {
  opacity: 0;
  pointer-events: none;
}

/* ── Single dot wrapper ── */
.nav-dot {
  position: relative;
  width:  var(--dot-outer);
  height: var(--dot-outer);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  /* pointer-events enabled so individual dots are clickable */
}

/* ── SVG progress ring (sits around the core) ── */
.dot-ring {
  position: absolute;
  inset: 0;
  width:  100%;
  height: 100%;
  overflow: visible;
  /* rotate so arc starts at top */
  transform: rotate(-90deg);
  pointer-events: none;
}

/* Track circle — faint background ring */
.dot-ring .ring-track {
  fill:         none;
  stroke:       rgba(255,255,255,0.12);
  stroke-width: var(--ring-stroke);
}

/* Progress circle — animated fill arc */
.dot-ring .ring-prog {
  fill:             none;
  stroke:           var(--accent2);
  stroke-width:     var(--ring-stroke);
  stroke-linecap:   round;
  /* stroke-dasharray & stroke-dashoffset driven by JS */
  transition:       stroke 0.3s ease;
}

/* ── Solid core dot ── */
.dot-core {
  width:         var(--dot-core);
  height:        var(--dot-core);
  border-radius: 50%;
  background:    rgba(255,255,255,0.28);
  position:      relative;
  z-index:       1;
  transition:
    background  0.3s ease,
    transform   0.35s var(--spring);
}

/* Active core — bright white, slightly larger */
.nav-dot.is-active .dot-core {
  background: rgba(255,255,255,0.92);
  transform:  scale(1.25);
}

/* Visited core — accent tint, ring stays full */
.nav-dot.is-visited .dot-core {
  background: rgba(196,120,58,0.55);
}

.nav-dot.is-visited .ring-prog {
  stroke: rgba(196,120,58,0.40);
}

/* ═══════════════════════════════════════════════════
   LINKS LAYER  (hover / "pill" state)
═══════════════════════════════════════════════════ */
.nav-links {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  z-index: 2;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease 0s;
}

#nav[data-state="pill"] .nav-links {
  opacity: 1;
  pointer-events: auto;
  transition-delay: 0.24s;
}

/* Divider */
.nav-divider {
  width: 1px; height: 14px;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* Link button */
.nav-link {
  position: relative;
  display: flex;
  align-items: center;
  height: 100%;
  padding: 0 13px;
  font-family: 'Unbounded', monospace;
  font-size: 8px; font-weight: 300;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.40);
  white-space: nowrap;
  cursor: pointer;
  border: none; background: none;
  transition: color 0.2s ease;
}
.nav-link:hover { color: rgba(255,255,255,0.92); }

/* Active indicator — small dot above label */
.nav-link::after {
  content: '';
  position: absolute;
  top: 8px; left: 50%;
  translate: -50% 0;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--accent2);
  scale: 0;
  transition: scale 0.25s var(--spring);
}
.nav-link.is-active { color: rgba(255,255,255,0.95); }
.nav-link.is-active::after { scale: 1; }

/* ═══════════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(45,74,62,.3); border-radius: 3px; }

---
/**
 * nav.js — Per-dot section-progress navigation
 *
 * Each dot has an SVG ring that fills 0→100% as its section scrolls.
 * When a section is fully past, the ring resets and the next fills.
 *
 * States (data-state on #nav):
 *   "dots"  → idle / scrolling:  dots + rings visible
 *   "pill"  → hover:             pill expands, text links visible
 *
 * Section progress formula:
 *   0%   = section top reaches the bottom of the viewport
 *   100% = section bottom leaves the top of the viewport
 *   This gives a full 0→100 sweep while ANY part of the section is on screen.
 */

(() => {
  'use strict';

  /* ─────────────────────────────────────────
     SECTION DATA
  ───────────────────────────────────────── */
  const SECTIONS = [
    { id: 's0', name: 'Visual System' },
    { id: 's1', name: 'Photography'   },
    { id: 's2', name: 'Illustration'  },
    { id: 's3', name: '3D'            },
    { id: 's4', name: 'Website'       },
    { id: 's5', name: 'Credits'       },
  ];

  /* ─────────────────────────────────────────
     SVG RING GEOMETRY
     Must match CSS --dot-ring and --ring-stroke values.
  ───────────────────────────────────────── */
  const RING_SIZE   = 16;                        // px — matches --dot-ring
  const STROKE_W    = 1.5;                       // px — matches --ring-stroke
  const RADIUS      = (RING_SIZE / 2) - (STROKE_W / 2) - 0.5; // inset radius
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;   // full circle length

  /* ─────────────────────────────────────────
     DOM
  ───────────────────────────────────────── */
  const nav      = document.getElementById('nav');
  const navDots  = document.getElementById('navDots');
  const navLinks = document.getElementById('navLinks');

  /* ─────────────────────────────────────────
     BUILD DOTS
     Each dot: wrapper > SVG ring > solid core
  ───────────────────────────────────────── */
  const cx = RING_SIZE / 2;
  const cy = RING_SIZE / 2;

  const dotEls = SECTIONS.map((sec, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'nav-dot';
    wrap.dataset.index = i;
    wrap.setAttribute('title', sec.name);

    /* SVG ring */
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `0 0 ${RING_SIZE} ${RING_SIZE}`);
    svg.setAttribute('width',  RING_SIZE);
    svg.setAttribute('height', RING_SIZE);
    svg.classList.add('dot-ring');

    /* track circle */
    const track = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    track.setAttribute('cx', cx);
    track.setAttribute('cy', cy);
    track.setAttribute('r',  RADIUS);
    track.classList.add('ring-track');

    /* progress arc */
    const prog = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    prog.setAttribute('cx', cx);
    prog.setAttribute('cy', cy);
    prog.setAttribute('r',  RADIUS);
    prog.classList.add('ring-prog');
    prog.style.strokeDasharray  = CIRCUMFERENCE;
    prog.style.strokeDashoffset = CIRCUMFERENCE; // 0% filled

    svg.appendChild(track);
    svg.appendChild(prog);

    /* core dot */
    const core = document.createElement('div');
    core.classList.add('dot-core');

    wrap.appendChild(svg);
    wrap.appendChild(core);
    navDots.appendChild(wrap);

    /* click → scroll to section */
    wrap.addEventListener('click', () => {
      document.getElementById(sec.id)?.scrollIntoView({ behavior: 'smooth' });
    });

    return { wrap, prog };
  });

  /* ─────────────────────────────────────────
     BUILD LINKS  (pill hover state)
  ───────────────────────────────────────── */
  const linkEls = SECTIONS.map((sec, i) => {
    if (i > 0) {
      const divider = document.createElement('span');
      divider.className = 'nav-divider';
      divider.setAttribute('aria-hidden', 'true');
      navLinks.appendChild(divider);
    }
    const btn = document.createElement('button');
    btn.className   = 'nav-link';
    btn.textContent = sec.name;
    btn.setAttribute('role', 'listitem');
    btn.setAttribute('aria-label', `Jump to ${sec.name}`);
    btn.addEventListener('click', () => {
      document.getElementById(sec.id)?.scrollIntoView({ behavior: 'smooth' });
    });
    navLinks.appendChild(btn);
    return btn;
  });

  /* ─────────────────────────────────────────
     STATE  (hover only — dots handle scroll visually)
  ───────────────────────────────────────── */
  let isHovered   = false;
  let activeIndex = 0;
  let rafId       = null;

  function applyState() {
    nav.dataset.state = isHovered ? 'pill' : 'dots';
  }

  nav.addEventListener('mouseenter', () => { isHovered = true;  applyState(); });
  nav.addEventListener('mouseleave', () => { isHovered = false; applyState(); });

  /* ─────────────────────────────────────────
     SECTION PROGRESS  (per dot)
     
     Progress = how far the user has scrolled
     through this section's "scroll window":
     
       0%   → section top just entered bottom of viewport
       50%  → halfway through the section
       100% → section bottom just left top of viewport
     
     Outside the window → clamped to 0 or 1.
  ───────────────────────────────────────── */
  function getSectionProgress(el) {
    const { top, bottom } = el.getBoundingClientRect();
    const vh = window.innerHeight;
    const h  = el.offsetHeight;

    // Total scroll distance while section is in view = h + vh
    // Start: top === vh   (section enters from bottom)
    // End:   bottom === 0 (section exits at top)
    const scrolled = vh - top;          // px scrolled since section entered
    const total    = h + vh;            // total scroll window for this section

    return Math.min(1, Math.max(0, scrolled / total));
  }

  /* ─────────────────────────────────────────
     ACTIVE SECTION  (which dot to highlight)
  ───────────────────────────────────────── */
  function getActiveSection() {
    const vh = window.innerHeight;
    let best = 0, bestScore = -Infinity;
    SECTIONS.forEach(({ id }, i) => {
      const el = document.getElementById(id);
      if (!el) return;
      const { top, bottom } = el.getBoundingClientRect();
      const inView = top < vh && bottom > 0;
      const score  = vh - top;
      if (inView && score > bestScore) { bestScore = score; best = i; }
    });
    return best;
  }

  /* ─────────────────────────────────────────
     RENDER  (rAF-throttled)
  ───────────────────────────────────────── */
  function render() {
    rafId = null;

    const current = getActiveSection();

    SECTIONS.forEach(({ id }, i) => {
      const el = document.getElementById(id);
      if (!el) return;

      const p          = getSectionProgress(el);      // 0 → 1
      const offset     = CIRCUMFERENCE * (1 - p);     // 0 = full, CIRCUMFERENCE = empty
      const { wrap, prog } = dotEls[i];

      /* Update SVG ring — no CSS transition on dashoffset for perfect sync */
      prog.style.strokeDashoffset = offset.toFixed(3);

      /* Dot class states */
      const isActive  = i === current;
      const isVisited = p >= 0.999;

      wrap.classList.toggle('is-active',  isActive && !isVisited);
      wrap.classList.toggle('is-visited', isVisited);
    });

    /* Sync active link in pill */
    if (current !== activeIndex) {
      activeIndex = current;
      linkEls.forEach((lnk, i) => lnk.classList.toggle('is-active', i === current));
    }
  }

  function onScroll() {
    if (!rafId) rafId = requestAnimationFrame(render);
  }

  /* ─────────────────────────────────────────
     INIT
  ───────────────────────────────────────── */
  window.addEventListener('scroll', onScroll, { passive: true });
  dotEls[0].wrap.classList.add('is-active');
  linkEls[0].classList.add('is-active');
  applyState();
  render();

})();

