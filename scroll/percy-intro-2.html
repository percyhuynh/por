<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Percy</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Inter", sans-serif;
        color: #f5f5f0;
      }

      /* ── PLACEHOLDER PAGE ── */
      #main-page {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #main-page p {
        font-size: 13px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #333;
      }

      /* ── OVERLAY ── */
      #intro-overlay {
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* thin horizontal rule — centred, always visible */
      #intro-overlay::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 55vw;
        height: 1px;
        background: rgba(255, 255, 255, 0.07);
        pointer-events: none;
      }

      /* film grain */
      #intro-overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
      }

      /* ── WORDS WRAPPER ── */
      #words-wrap {
        display: flex;
        align-items: flex-end;
        gap: clamp(6px, 1vw, 14px);
        position: relative;
        z-index: 2;
      }

      /* ── PERCY ── */
      #percy-wrap {
        display: flex;
        align-items: flex-end;
        perspective: 420px;
        perspective-origin: 50% 100%;
      }

      .percy-letter {
        display: inline-block;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: clamp(26px, 5vw, 56px);
        color: #f5f5f0;
        letter-spacing: 0.01em;
        line-height: 1;
        opacity: 0;
        -webkit-font-smoothing: antialiased;
      }

      /* ── SECONDARY WORD SLOT ── */
      #secondary-wrap {
        overflow: hidden;
        opacity: 0;
      }

      #secondary-inner {
        display: flex;
        flex-direction: column;
      }

      .secondary-word {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: clamp(11px, 2vw, 32px);
        color: #838383;
        letter-spacing: 0.02em;
        line-height: 1.3;
        white-space: nowrap;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- PLACEHOLDER PAGE -->
    <div id="main-page">
      <p>Your website here</p>
    </div>

    <!-- INTRO OVERLAY -->
    <div id="intro-overlay">
      <div id="words-wrap">
        <div id="percy-wrap">
          <span class="percy-letter">P</span>
          <span class="percy-letter">e</span>
          <span class="percy-letter">r</span>
          <span class="percy-letter">c</span>
          <span class="percy-letter">y</span>
        </div>
        <div id="secondary-wrap">
          <div id="secondary-inner">
            <span class="secondary-word">Value</span>
            <span class="secondary-word">Vision</span>
            <span class="secondary-word">Design</span>
            <span class="secondary-word">Impact</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const overlay = document.getElementById("intro-overlay");
      const percyWrap = document.getElementById("percy-wrap");
      const wordsWrap = document.getElementById("words-wrap");
      const letters = document.querySelectorAll(".percy-letter");
      const secWrap = document.getElementById("secondary-wrap");
      const secInner = document.getElementById("secondary-inner");
      const words = document.querySelectorAll(".secondary-word");

      document.fonts.ready.then(() => {
        const wordH = words[0].getBoundingClientRect().height;
        secWrap.style.height = wordH + "px";

        const tl = gsap.timeline();

        // ── SEQ 1: Letters plunge from 3D depth ──
        letters.forEach((letter, i) => {
          tl.fromTo(
            letter,
            { opacity: 0, y: -60, z: 280 },
            {
              opacity: 1,
              y: 0,
              z: 0,
              duration: 0.55,
              ease: "power4.out",
              onComplete() {
                gsap.to(letter, {
                  scaleY: 0.87,
                  scaleX: 1.09,
                  duration: 0.055,
                  yoyo: true,
                  repeat: 1,
                  ease: "power2.inOut",
                });
              },
            },
            0.12 + i * 0.08,
          );
        });

        // ── SEQ 2: Percy shifts left, secondary fades in ──
        tl.to(
          percyWrap,
          { x: -12, duration: 0.4, ease: "power2.inOut" },
          "+=0.18",
        );
        tl.to(secWrap, { opacity: 1, duration: 0.2 }, "<0.05");

        // ── SEQ 3: Cycle words — accelerating ──
        const cycles = [
          { hold: 0.5, slide: 0.35 },
          { hold: 0.42, slide: 0.28 },
          { hold: 0.32, slide: 0.22 },
        ];

        cycles.forEach(({ hold, slide }, i) => {
          tl.to(
            secInner,
            {
              y: -wordH * (i + 1),
              duration: slide,
              ease: "power3.inOut",
            },
            `+=${hold}`,
          );
        });

        // ── SEQ 4: scale up + overlay slides LEFT ──
        tl.to(
          wordsWrap,
          {
            scale: 1.18,
            opacity: 0,
            duration: 0.75,
            ease: "power3.in",
          },
          "+=0.28",
        );

        tl.to(
          overlay,
          {
            yPercent: -100, // trượt lên trên
            duration: 0.75,
            ease: "power4.inOut",
            onComplete() {
              overlay.style.display = "none";
              document.body.style.overflow = "auto";
            },
          },
          "<",
        );
      });
    </script>
  </body>
</html>
